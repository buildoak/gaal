# error-manifest.toml — Declarative list of all gaal error-triggering commands
#
# Source of truth for Layer 1 AX testing. generate-errors.sh reads this file.
# When a developer adds a new command or flag to gaal, they MUST add error
# entries here covering the new error paths.
#
# Exit codes (from docs/getting-started.md):
#   0  = success
#   1  = no results
#   2  = ambiguous ID
#   3  = not found
#   10 = missing index (not testable without deleting index)
#   11 = parse error

# ─── Exit code 3: Not Found ───────────────────────────────────────────────────

[[errors]]
name = "inspect-nonexistent"
command = "gaal inspect nonexistent123"
expected_exit = 3
description = "Unknown session ID passed to inspect"

[[errors]]
name = "inspect-nonexistent-human"
command = "gaal inspect nonexistent123 -H"
expected_exit = 3
description = "Unknown session ID passed to inspect (human mode)"

[[errors]]
name = "transcript-nonexistent"
command = "gaal transcript nonexistent123"
expected_exit = 3
description = "Unknown session ID passed to transcript"

[[errors]]
name = "transcript-nonexistent-human"
command = "gaal transcript nonexistent123 -H"
expected_exit = 3
description = "Unknown session ID passed to transcript (human mode)"

[[errors]]
name = "find-salt-nonexistent"
command = "gaal find-salt XNOSALT_9f8e7d6c5b4a3210_XNOSALT"
expected_exit = 3
description = "find-salt returns NotFound for nonexistent salt token"

[[errors]]
name = "find-salt-nonexistent-human"
command = "gaal find-salt XNOSALT_9f8e7d6c5b4a3210_XNOSALT -H"
expected_exit = 3
description = "find-salt returns NotFound for nonexistent salt token (human mode)"

[[errors]]
name = "tag-nonexistent-session"
command = "gaal tag nonexistent123 mytag"
expected_exit = 3
description = "Tagging a nonexistent session"

[[errors]]
name = "index-reindex-nonexistent"
command = "gaal index reindex nonexistent123"
expected_exit = 3
description = "Reindexing a nonexistent session"

[[errors]]
name = "create-handoff-nonexistent"
command = "gaal create-handoff nonexistent123"
expected_exit = 3
description = "Handoff for a nonexistent session"

[[errors]]
name = "create-handoff-latest"
command = "gaal create-handoff latest --dry-run"
expected_exit = 0
description = "create-handoff resolves 'latest' to most recent session"

# ─── Exit code 2: Ambiguous ID ────────────────────────────────────────────────

[[errors]]
name = "inspect-ambiguous"
command = "gaal inspect a"
expected_exit = 2
description = "Single-char ID prefix matches multiple sessions"

[[errors]]
name = "transcript-ambiguous"
command = "gaal transcript a"
expected_exit = 2
description = "Ambiguous prefix for transcript"

# ─── Exit code 11: Parse Error ────────────────────────────────────────────────

[[errors]]
name = "who-no-verb"
command = "gaal who DOCS.md"
expected_exit = 11
description = "Missing verb in who command — target without action"

[[errors]]
name = "who-no-verb-human"
command = "gaal who DOCS.md -H"
expected_exit = 11
description = "Missing verb in who command (human mode)"

[[errors]]
name = "who-invalid-verb"
command = "gaal who ate DOCS.md"
expected_exit = 11
description = "Invalid verb in who command"

[[errors]]
name = "search-empty-parse-error"
command = "gaal search ''"
expected_exit = 11
description = "Empty search query"

[[errors]]
name = "find-salt-no-arg"
command = "gaal find-salt"
expected_exit = 11
description = "find-salt with no salt token argument"

[[errors]]
name = "tag-no-args"
command = "gaal tag"
expected_exit = 11
description = "tag with no arguments at all"

[[errors]]
name = "ls-since-garbage"
command = "gaal ls --since garbage"
expected_exit = 11
description = "Invalid date format in --since"

[[errors]]
name = "who-since-garbage"
command = "gaal who wrote DOCS.md --since garbage"
expected_exit = 11
description = "Invalid date in --since for who"

[[errors]]
name = "inspect-no-selector"
command = "gaal inspect"
expected_exit = 11
description = "Inspect with no ID, no --ids, no --tag"

[[errors]]
name = "transcript-no-id"
command = "gaal transcript"
expected_exit = 0
description = "Transcript with no ID prints help (exits 0)"

# ─── Exit code 1: No Results ──────────────────────────────────────────────────

[[errors]]
name = "ls-no-results"
command = "gaal ls --since 2020-01-01 --before 2020-01-02"
expected_exit = 1
description = "ls with a window that has zero sessions"

[[errors]]
name = "search-no-results"
command = "gaal search 'xyzzy' --since 1s"
expected_exit = 1
description = "Search for a term with 1-second time window guarantees no results"

[[errors]]
name = "search-empty"
command = "gaal search 'hello' --since 1s"
expected_exit = 1
description = "search with 1-second window returns NoResults"

[[errors]]
name = "who-no-results"
command = "gaal who wrote 'NONEXISTENT_FILE_xyzzy_999.rs' --since 1d"
expected_exit = 1
description = "who query that matches no sessions"

[[errors]]
name = "recall-fuzzy-match"
command = "gaal recall 'xyzzy_nonexistent_impossible_term_999'"
expected_exit = 0
description = "Recall with gibberish still fuzzy-matches — returns low-score results (exit 0)"

# ─── Exit code 0: Success paths that are edge cases ───────────────────────────

[[errors]]
name = "recall-no-args"
command = "gaal recall"
expected_exit = 0
description = "recall with no args prints help and exits 0"

[[errors]]
name = "salt-generate"
command = "gaal salt"
expected_exit = 0
description = "salt generation always succeeds — baseline control"

[[errors]]
name = "tag-ls"
command = "gaal tag ls"
expected_exit = 0
description = "tag ls lists all tags — baseline control"

[[errors]]
name = "index-status"
command = "gaal index status"
expected_exit = 0
description = "index status — baseline control for healthy index"

[[errors]]
name = "ls-default"
command = "gaal ls --limit 1"
expected_exit = 0
description = "ls with minimal output — baseline control"
